<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnPassive｜ETF 總報酬幻覺拆解器</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --primary-color: #2563eb; --bg-color: #f0f4f8; --text-main: #1e293b; --text-muted: #64748b; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin:0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    h1 { color: #0f172a; text-align: center; margin-bottom: 8px; font-size: 26px; }
    h1 span { color: var(--primary-color); }
    .subtitle { text-align:center; color: var(--text-muted); font-size:16px; margin-bottom:30px; }
    
    .flex-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .flex-col { flex: 1; min-width: 250px; }
    
    label { display:block; margin-bottom: 8px; font-weight:600; color:#334155; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; background: #f8fafc; }
    
    button { background: var(--primary-color); color: white; padding: 14px 32px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin: 10px 0 20px; }
    button:hover { background: #1d4ed8; }
    
    .warning { background: #fef3c7; color: #92400e; padding: 12px 15px; border-radius: 8px; margin: 15px 0; display: none; font-size: 14px; border-left: 4px solid #f59e0b; }
    .result { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
    .diff-box { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; }
    .final-amounts { font-size: 16px; color: #475569; margin-bottom: 15px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 15px; line-height: 2; }
    .diff-text { font-size: 22px; font-weight: 700; color: #b91c1c; text-align: center; }
    
    /* 底部資訊樣式 */
    footer { margin-top: 40px; text-align: center; padding: 20px; border-top: 1px solid #e2e8f0; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
    footer a { color: var(--primary-color); text-decoration: none; }
    footer .copyright { margin-top: 10px; font-weight: 500; }
  </style>
</head>
<body>

<div class="container">
  <h1>理性財務自由 <span>ETF 總報酬對決</span></h1>
  <p class="subtitle">配息率再高，也敵不過真實的複利。用數據打破高股息幻覺。</p>

  <div class="flex-row">
    <div class="flex-col">
      <label>對戰 ETF (A)：</label>
      <select id="etfA"></select>
    </div>
    <div class="flex-col">
      <label>對戰 ETF (B)：</label>
      <select id="etfB"></select>
    </div>
  </div>

  <div class="flex-row">
    <div class="flex-col">
      <label>每月初定額投入（元）：</label>
      <input type="number" id="amount" value="10000" step="1000">
    </div>
    <div class="flex-col">
      <label>最大回測年限（年）：<span id="yearsValue" style="color:#2563eb;">15</span></label>
      <input type="range" id="years" min="1" max="25" value="15" oninput="document.getElementById('yearsValue').textContent=this.value">
    </div>
  </div>

  <button onclick="calculate()">🚀 啟動總報酬壓力測試</button>

  <div id="warning" class="warning"></div>

  <div class="result" id="result" style="display:none;">
    <canvas id="chart" height="150"></canvas>
    <div class="diff-box">
      <div id="finalAmounts" class="final-amounts"></div>
      <div id="diff" class="diff-text"></div>
    </div>
    <p style="text-align:center; color:var(--text-muted); font-size:14px; margin-top:15px;">
      * 以上數據包含「配息再投資」之總報酬走勢。
    </p>
  </div>

  <footer>
    <div>聯絡信箱：<a href="mailto:passiveen@gmail.com">passiveen@gmail.com</a></div>
    <div class="copyright">© 2026 EnPassive. All rights reserved.</div>
    <div style="margin-top:5px; opacity:0.7;">本工具僅供數據參考，不構成任何投資建議。</div>
  </footer>
</div>

<script>
const etfList = [
  { id: '0050.TW', name: '0050 元大台灣50' }, { id: '0056.TW', name: '0056 元大高股息' }, { id: '006208.TW', name: '006208 富邦台50' }, { id: '00878.TW', name: '00878 國泰永續高股息' }, { id: '00929.TW', name: '00929 復華台灣科技優息' }, { id: '00919.TW', name: '00919 群益台灣精選高息' }, { id: '00713.TW', name: '00713 元大台灣高息低波' }, { id: '00918.TW', name: '00918 大華優利高填息30' }, { id: '0052.TW', name: '0052 富邦科技' }, { id: '00939.TW', name: '00939 統一台灣高息動能' }, { id: '00940.TW', name: '00940 元大台灣價值高息' }, { id: '00915.TW', name: '00915 凱基優選高股息30' }, { id: '00881.TW', name: '00881 國泰台灣5G+' }, { id: '00891.TW', name: '00891 中信關鍵半導體' }, { id: '00900.TW', name: '00900 富邦特選高股息30' }, { id: '00922.TW', name: '00922 國泰台灣領袖50' }, { id: '00923.TW', name: '00923 群益台灣ESG低碳' }, { id: '00692.TW', name: '00692 富邦公司治理' }, { id: '00850.TW', name: '00850 元大台灣ESG永續' }, { id: '00733.TW', name: '00733 富邦台灣中小' }, { id: '00905.TW', name: '00905 FT臺灣Smart' }, { id: '00934.TW', name: '00934 中信成長高股息' }, { id: '00936.TW', name: '00936 台新臺灣IC設計' }, { id: '00944.TW', name: '00944 野村臺灣趨勢高股息' }, { id: '00946.TW', name: '00946 群益台灣科技高息' }, { id: '0051.TW', name: '0051 元大中型100' }, { id: '00894.TW', name: '00894 中信臺灣智慧50' }, { id: '00896.TW', name: '00896 中信綠能及電動車' }, { id: '00901.TW', name: '00901 永豐台灣智能車供應鏈' }, { id: '00904.TW', name: '00904 新光臺灣半導體30' }, { id: '00907.TW', name: '00907 永豐台灣優選入息' }
];

function initSelects() {
  const sA = document.getElementById('etfA'), sB = document.getElementById('etfB');
  let h = ''; etfList.forEach(e => h += `<option value="${e.id}">${e.name}</option>`);
  sA.innerHTML = h; sB.innerHTML = h; sA.value = '0050.TW'; sB.value = '0056.TW';
}

let etfData = {};
fetch('etf_data.json').then(r => r.json()).then(d => { etfData = d; initSelects(); });

function calculate() {
  const tA = document.getElementById('etfA').value, tB = document.getElementById('etfB').value;
  if(tA === tB) { alert("請選擇兩檔不同的 ETF！"); return; }
  const nA = document.getElementById('etfA').options[document.getElementById('etfA').selectedIndex].text.split(' ')[0];
  const nB = document.getElementById('etfB').options[document.getElementById('etfB').selectedIndex].text.split(' ')[0];
  const m = parseInt(document.getElementById('amount').value) || 10000, y = parseInt(document.getElementById('years').value);
  const dataA = etfData[tA] || [], dataB = etfData[tB] || [];
  const actualMonths = Math.min(dataA.length, dataB.length, y * 12);
  const warn = document.getElementById('warning');
  if (actualMonths < y * 12) { warn.innerHTML = `⚠️ 注意：僅使用近 <strong>${(actualMonths/12).toFixed(1)} 年</strong> 歷史數據進行對比。`; warn.style.display = 'block'; } else warn.style.display = 'none';
  const sA = dataA.slice(-actualMonths), sB = dataB.slice(-actualMonths);
  let uA = 0, uB = 0, l = [], lA = [], lB = [];
  for (let i = 0; i < actualMonths; i++) {
    l.push(sA[i].date); uA += m / sA[i].adj_close; uB += m / sB[i].adj_close;
    lA.push(Math.round(uA * sA[i].adj_close)); lB.push(Math.round(uB * sB[i].adj_close));
  }
  if (window.myChart) window.myChart.destroy();
  window.myChart = new Chart(document.getElementById('chart'), {
    type: 'line', data: { labels: l, datasets: [{ label: nA, data: lA, borderColor: '#2563eb', tension: 0.3, borderWidth: 3, pointRadius: 0 }, { label: nB, data: lB, borderColor: '#f59e0b', tension: 0.3, borderWidth: 3, pointRadius: 0 }] },
    options: { responsive: true, interaction: { mode: 'index', intersect: false }, scales: { y: { ticks: { callback: v => (v/10000).toFixed(0) + ' 萬' } } } }
  });
  const fA = lA[lA.length - 1], fB = lB[lB.length - 1], d = fA - fB;
  document.getElementById('finalAmounts').innerHTML = `🎯 ${nA} 最終資產：<span style="color:#2563eb;font-weight:bold">${(fA/10000).toLocaleString()} 萬</span><br>🎯 ${nB} 最終資產：<span style="color:#f59e0b;font-weight:bold">${(fB/10000).toLocaleString()} 萬</span>`;
  document.getElementById('diff').innerHTML = d === 0 ? "🤝 最終總資產平手" : `🏆 ${d > 0 ? nA : nB} 總額勝出 <strong>${(Math.abs(d)/10000).toFixed(1)} 萬</strong>`;
  document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
